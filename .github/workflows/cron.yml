name: Newsletters Dispatch

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 11 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:
    inputs:
      type:
        description: 'Manual Trigger Type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  newsletter-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Determine Dispatch Type
        id: dispatch
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" == "02" ]; then
              echo "type=daily" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "11" ]; then
              echo "type=weekly" >> $GITHUB_OUTPUT
            elif [ "$HOUR" == "15" ]; then
              echo "type=monthly" >> $GITHUB_OUTPUT
            else
              echo "type=daily" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Hit Dispatch Endpoint
        run: |
          curl -f -X GET "${{ secrets.PROD_URL }}/api/newsletter?type=${{ steps.dispatch.outputs.type }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
